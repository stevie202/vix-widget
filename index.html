<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIX Fear Gauge</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 8px;
  }
  .label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #666;
  }
  .widget-wrap {
    width: 100%;
    max-width: 480px;
    border: 1px solid #1e1e1e;
  }
  .guide {
    width: 100%;
    max-width: 480px;
    border: 1px solid #1e1e1e;
    padding: 20px 24px;
  }
  .guide-title {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #444;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .guide-row {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 6px 0;
    border-bottom: 1px solid #161616;
  }
  .guide-row:last-child { border-bottom: none; }
  .guide-range { color: #555; }
  .guide-label { font-weight: 600; }
  .calm    { color: #00ff88; }
  .neutral { color: #888; }
  .caution { color: #ffcc00; }
  .fear    { color: #ff8800; }
  .extreme { color: #ff4466; }
  .footer {
    font-size: 8px;
    letter-spacing: 0.1em;
    color: #333;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="label">CBOE · S&amp;P 500</div>
  <div class="subtitle">Volatility Index · Fear Gauge</div>
</div>

<!-- TradingView Single Ticker Widget -->
<div class="widget-wrap">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
    {
      "symbol": "CBOE:VIX",
      "width": "100%",
      "colorTheme": "dark",
      "isTransparent": false,
      "locale": "en"
    }
    </script>
  </div>
</div>

<!-- TradingView Mini Chart Widget -->
<div class="widget-wrap">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
    {
      "symbol": "CBOE:VIX",
      "width": "100%",
      "height": 220,
      "locale": "en",
      "dateRange": "1M",
      "colorTheme": "dark",
      "isTransparent": false,
      "autosize": false,
      "largeChartUrl": "https://www.tradingview.com/symbols/CBOE-VIX/"
    }
    </script>
  </div>
</div>

<!-- Fear guide -->
<div class="guide">
  <div class="guide-title">Reading the VIX</div>
  <div class="guide-row"><span class="guide-range">&lt; 15</span><span class="guide-label calm">CALM — Low volatility</span></div>
  <div class="guide-row"><span class="guide-range">15 – 20</span><span class="guide-label neutral">NEUTRAL — Normal market</span></div>
  <div class="guide-row"><span class="guide-range">20 – 25</span><span class="guide-label caution">CAUTIOUS — Watch closely</span></div>
  <div class="guide-row"><span class="guide-range">25 – 35</span><span class="guide-label fear">FEAR — Elevated anxiety</span></div>
  <div class="guide-row"><span class="guide-range">&gt; 35</span><span class="guide-label extreme">EXTREME FEAR — Crisis mode</span></div>
</div>

<div class="footer">Data by TradingView · Auto-updates</div>

</body>
</html>
