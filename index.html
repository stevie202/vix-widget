<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIX Fear Gauge</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 32px 16px;
  }

  .header { text-align: center; }
  .label { font-size: 10px; letter-spacing: 0.3em; color: #444; margin-bottom: 4px; }
  .subtitle { font-size: 12px; letter-spacing: 0.15em; color: #666; }

  /* Stockanalysis iframe — allows embedding */
  .widget-frame {
    width: 100%;
    max-width: 500px;
    border: 1px solid #1e1e1e;
    background: #111;
    overflow: hidden;
  }

  iframe {
    display: block;
    width: 100%;
    border: none;
    background: #111;
  }

  /* Fear guide */
  .guide {
    width: 100%;
    max-width: 500px;
    border: 1px solid #1e1e1e;
    padding: 20px 24px;
  }
  .guide-title { font-size: 9px; letter-spacing: 0.2em; color: #444; margin-bottom: 14px; }
  .guide-row { display: flex; justify-content: space-between; font-size: 9px; letter-spacing: 0.08em; padding: 6px 0; border-bottom: 1px solid #161616; }
  .guide-row:last-child { border-bottom: none; }
  .guide-range { color: #444; }
  .calm    { color: #00ff88; font-weight: 600; }
  .neutral { color: #888;    font-weight: 600; }
  .caution { color: #ffcc00; font-weight: 600; }
  .fear    { color: #ff8800; font-weight: 600; }
  .extreme { color: #ff4466; font-weight: 600; }

  /* Quick links */
  .links {
    width: 100%;
    max-width: 500px;
    display: flex;
    gap: 8px;
  }
  .link-btn {
    flex: 1;
    display: block;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: #444;
    border: 1px solid #1e1e1e;
    padding: 10px;
    transition: all 0.15s;
  }
  .link-btn:hover { color: #00ff88; border-color: #00ff88; }

  .dot { display: inline-block; width: 5px; height: 5px; background: #00ff88; border-radius: 50%; animation: pulse 2s infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,255,136,0.5); }
    50%      { opacity:0.5; box-shadow: 0 0 0 4px rgba(0,255,136,0); }
  }
  .live-label { font-size: 8px; letter-spacing: 0.15em; color: #333; }
</style>
</head>
<body>

<div class="header">
  <div class="label">CBOE · S&P 500</div>
  <div class="subtitle">Volatility Index · Fear Gauge</div>
</div>

<div class="live-label"><span class="dot"></span>LIVE DATA</div>

<!-- Wisesheets / stockanalysis embeddable chart for VIX -->
<div class="widget-frame">
  <iframe
    src="https://stockanalysis.com/stocks/vix/chart/?embed=1"
    height="300"
    scrolling="no"
    title="VIX Chart">
  </iframe>
</div>

<div class="guide">
  <div class="guide-title">Reading the VIX</div>
  <div class="guide-row"><span class="guide-range">&lt; 15</span><span class="calm">CALM — Low volatility</span></div>
  <div class="guide-row"><span class="guide-range">15 – 20</span><span class="neutral">NEUTRAL — Normal market</span></div>
  <div class="guide-row"><span class="guide-range">20 – 25</span><span class="caution">CAUTIOUS — Watch closely</span></div>
  <div class="guide-row"><span class="guide-range">25 – 35</span><span class="fear">FEAR — Elevated anxiety</span></div>
  <div class="guide-row"><span class="guide-range">&gt; 35</span><span class="extreme">EXTREME FEAR — Crisis mode</span></div>
</div>

<div class="links">
  <a class="link-btn" href="https://finance.yahoo.com/quote/%5EVIX" target="_blank">↗ Yahoo Finance</a>
  <a class="link-btn" href="https://www.cboe.com/tradable-products/vix/" target="_blank">↗ CBOE Official</a>
  <a class="link-btn" href="https://www.marketwatch.com/investing/index/vix" target="_blank">↗ MarketWatch</a>
</div>

</body>
</html>
